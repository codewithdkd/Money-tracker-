<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background rich teal emerald gradient -->
    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0fa986" />
      <stop offset="100%" stop-color="#045d52" />
    </linearGradient>
    
    <!-- Soft shadow filters -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#022a25" flood-opacity="0.3" />
    </filter>
    
    <filter id="receiptShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#023d35" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Ground / Canvas rounded background icon mask -->
  <rect width="512" height="512" rx="120" fill="url(#emeraldGradient)" />

  <!-- 3D-effect Donut Chart peaking out on the right (Behind Receipt) -->
  <g filter="url(#softShadow)" transform="translate(4, -10)">
    <!-- Yellow/Orange slice -->
    <path d="M 370 260 L 440 340 A 110 110 0 0 1 290 345 Z" fill="#f89e1b" />
    <!-- Blue slice -->
    <path d="M 370 260 L 290 345 A 110 110 0 0 1 340 152 Z" fill="#1b85f3" />
    <!-- Green slice -->
    <path d="M 370 260 L 340 152 A 110 110 0 0 1 440 215 Z" fill="#5cb82a" />
    
    <!-- White donut inner mask gap -->
    <circle cx="370" cy="260" r="54" fill="#06675b" />
  </g>

  <!-- White serrated thermal receipt card -->
  <g filter="url(#receiptShadow)">
    <path d="M 90 120 
             C 90 105, 105 90, 120 90 
             L 290 90 
             C 305 90, 320 105, 320 120 
             L 320 400 
             L 305 415 L 290 400 L 275 415 L 260 400 L 245 415 L 230 400 L 215 415 L 200 400 L 185 415 L 170 400 L 155 415 L 140 400 L 125 415 L 110 400 L 95 415 
             Z" 
          fill="#ffffff" />
          
    <!-- Indian Rupee Giant Symbol -->
    <text x="120" y="195" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="94" fill="#005a4e">₹</text>

    <!-- Receipt Header Lines simulating summary text -->
    <rect x="202" y="130" width="85" height="11" rx="5.5" fill="#d1d7db" />
    <rect x="202" y="152" width="85" height="11" rx="5.5" fill="#d1d7db" />
    <rect x="202" y="174" width="55" height="11" rx="5.5" fill="#d1d7db" />

    <!-- Itemized List rows -->
    <!-- Shopping: Green Circle Bag icon + text -->
    <circle cx="132" cy="254" r="19" fill="#2cb657" />
    <!-- Vector Shopping Bag shape -->
    <path d="M 127 248 L 137 248 C 137 245, 127 245, 127 248 Z" fill="none" stroke="#ffffff" stroke-width="2" />
    <rect x="125" y="249" width="14" height="11" rx="2" fill="#ffffff" />
    <rect x="165" y="251" width="65" height="7" rx="3.5" fill="#d1d7db" />
    <text x="246" y="258" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="14" fill="#1e293b" text-anchor="start">- ₹1,250</text>

    <!-- Transport: Blue Circle Car icon + text -->
    <circle cx="132" cy="306" r="19" fill="#0c6df0" />
    <!-- Vector Car shape style -->
    <path d="M 124 309 C 124 306, 126 304, 132 304 C 138 304, 140 306, 140 309 Z" fill="#ffffff" />
    <rect x="123" y="307" width="18" height="6" rx="2" fill="#ffffff" />
    <circle cx="127" cy="313" r="2" fill="#000000" />
    <circle cx="137" cy="313" r="2" fill="#000000" />
    <rect x="165" y="303" width="65" height="7" rx="3.5" fill="#d1d7db" />
    <text x="248" y="310" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="14" fill="#1e293b" text-anchor="start">- ₹850</text>

    <!-- Dinner : Orange Circle Fork/Knife + text -->
    <circle cx="132" cy="358" r="19" fill="#f28f00" />
    <!-- Fork & Knife vectors -->
    <path d="M 127 349 L 127 357 stroke-width=2 M 125 349 L 129 349 M 125 352 L 129 352" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none" />
    <path d="M 136 348 C 138 348, 138 356, 136 358 L 136 366" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <rect x="165" y="355" width="65" height="7" rx="3.5" fill="#d1d7db" />
    <text x="248" y="362" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="14" fill="#1e293b" text-anchor="start">- ₹450</text>
  </g>
</svg>
